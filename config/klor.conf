# --- KLOR (polydactyl) configuration ---

# Rotary encoders (EC11)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Mouse / pointing — smart-mouse combo + mouse layer (urob's mouse.dtsi)
CONFIG_ZMK_POINTING=y

# OLED display (KLOR's SSD1306, ZMK default status screen)
CONFIG_ZMK_DISPLAY=y

# Power management. Deep sleep is DISABLED on purpose: this build is wall-powered
# (left = USB, right = powered from the left over TRRS), so there is no battery to
# conserve. With sleep enabled, the idle left half powers down its rails and cuts
# the TRRS power feeding the right half, which then drops off until the left is
# power-cycled. Keeping it awake keeps the right half alive.
# (If you ever switch to battery/wireless, re-enable these.)
CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Bluetooth tweaks (from urob)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Per-key RGB underglow is available on KLOR but left disabled (the LEDs are
# already dark in this build). To use it later: define the WS2812 strip in the
# shield (a &spi1 led_strip node + chosen zmk,underglow) and add
#   CONFIG_ZMK_RGB_UNDERGLOW=y
#   CONFIG_WS2812_STRIP_SPI=y
# (add CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n to have it defined but boot off).
